<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filius Web - Simulateur de Réseau Éducatif</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    
    <!-- Style de chargement inline pour affichage immédiat -->
    <style>
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #2d3748;
            border-top: 4px solid #4361ee;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text {
            margin-top: 20px;
            color: #a0aec0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    
    <!-- Bibliothèques locales (mode hors-ligne) -->
    <script src="lib/react.min.js"></script>
    <script src="lib/react-dom.min.js"></script>
    <script src="lib/babel.min.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Écran de chargement -->
    <div id="loading-screen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Chargement de Filius Web...</div>
    </div>
    
    <div id="root"></div>
    
    <!-- Scripts de l'application (ordre important) -->
    <script type="text/babel" src="js/constants.js"></script>
    <script type="text/babel" src="js/utils.js"></script>
    <script type="text/babel" src="js/context.js"></script>
    
    <!-- Composants UI -->
    <script type="text/babel" src="js/components/Header.js"></script>
    <script type="text/babel" src="js/components/ComponentPanel.js"></script>
    <script type="text/babel" src="js/components/DeviceNode.js"></script>
    <script type="text/babel" src="js/components/Canvas.js"></script>
    <script type="text/babel" src="js/components/PropertiesPanel.js"></script>
    <script type="text/babel" src="js/components/LogConsole.js"></script>
    <script type="text/babel" src="js/components/ContextMenu.js"></script>
    <script type="text/babel" src="js/components/AppWindow.js"></script>
    
    <!-- Applications -->
    <script type="text/babel" src="js/apps/CommandLine.js"></script>
    <script type="text/babel" src="js/apps/Terminal.js"></script>
    <script type="text/babel" src="js/apps/Browser.js"></script>
    <script type="text/babel" src="js/apps/Explorer.js"></script>
    <script type="text/babel" src="js/apps/TextEditor.js"></script>
    <script type="text/babel" src="js/apps/WebServer.js"></script>
    <script type="text/babel" src="js/apps/DNSServer.js"></script>
    <script type="text/babel" src="js/apps/DHCPServer.js"></script>
    
    <!-- Modales -->
    <script type="text/babel" src="js/modals/HelpModal.js"></script>
    
    <!-- Application principale -->
    <script type="text/babel" src="js/App.js"></script>
    <script src="elea-auto-sacsim.js"></script>
</body>
</html>
